services:
  postgres:
    image: postgres:16-alpine
    container_name: vasant-trailer-erp-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: vasant
      POSTGRES_PASSWORD: vasant
      POSTGRES_DB: trailer_erp
    ports:
      - "5432:5432"
    volumes:
      - trailer_erp_pgdata:/var/lib/postgresql/data
      - ./migrations/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vasant -d trailer_erp"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  trailer_erp_pgdata:

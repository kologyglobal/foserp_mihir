services:
  mysql:
    image: mysql:8
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-fos_erp}
      MYSQL_USER: ${MYSQL_USER:-fos}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?Set MYSQL_PASSWORD in .env.production}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?Set MYSQL_ROOT_PASSWORD in .env.production}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - fos

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 5000
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${MYSQL_DATABASE:-fos_erp}
      DB_USER: ${MYSQL_USER:-fos}
      DB_PASS: ${MYSQL_PASSWORD}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:?Set JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?Set JWT_REFRESH_SECRET}
      JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
      CRM_UPLOAD_DIR: /data/uploads
      CRM_MAX_UPLOAD_BYTES: ${CRM_MAX_UPLOAD_BYTES:-26214400}
    volumes:
      - crm_uploads:/data/uploads
    # Optional host bind for debugging; nginx proxies /api in production
    ports:
      - "${BACKEND_HOST_PORT:-5000}:5000"
    networks:
      - fos

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_USE_API: "true"
        VITE_API_BASE_URL: /api/v1
        VITE_TENANT_SLUG: ${VITE_TENANT_SLUG:-vasant-trailers}
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${HTTP_PORT:-80}:80"
    networks:
      - fos

volumes:
  mysql_data:
  crm_uploads:

networks:
  fos:
    driver: bridge
